
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/blog_app?createDatabaseIfNotExist=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        auto_quote_keyword: true
    defer-datasource-initialization: true
  sql:
    initiation:
      mode: always
  data:
    web:
      pageable:
        default-page-size: 10
        one-indexed-parameter: true
        page-parameter: page
        size-parameter: size
      sort:
        sort-parameter: sort
